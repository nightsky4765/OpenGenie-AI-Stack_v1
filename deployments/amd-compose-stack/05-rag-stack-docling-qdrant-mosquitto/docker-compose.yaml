services:
  mosquitto:
    image: ${MQTT_IMAGE:-eclipse-mosquitto:latest}
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
    networks:
      - ai_stack_net
    volumes:
      - ${BASE_DIR:-/home/wrt/TigerAI}/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ${BASE_DIR:-/home/wrt/TigerAI}/mosquitto/data:/mosquitto/data
      - ${BASE_DIR:-/home/wrt/TigerAI}/mosquitto/log:/mosquitto/log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  docling:
    image: ${DOCLING_IMAGE:-ghcr.io/docling-project/docling-serve-cpu:latest}
    container_name: docling-rocm
    restart: always
    ports:
      - "5001:5001"
    networks:
      - ai_stack_net
    shm_size: ${DOCLING_SHM:-16gb}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ${BASE_DIR:-/home/wrt/TigerAI}/docling:/app/data
      - /usr/lib/x86_64-linux-gnu/dri:/usr/lib/x86_64-linux-gnu/dri:ro
      - /usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.0
      - OMP_NUM_THREADS=40
      - OCR_STRATEGY=auto
      - DOCLING_SERVE_MAX_SYNC_WAIT=9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: qdrant
    restart: always
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    networks:
      - ai_stack_net
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=40
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_MAX_THREADS=4
      - QDRANT__LOG_LEVEL=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  ai_stack_net:
    external: true

volumes:
  qdrant_storage:
