services:
  wud:
    image: fmartinou/whats-up-docker:latest
    container_name: wud
    restart: always
    environment:
      - WUD_WATCHER_LOCAL_CRON=0 4 * * *
      - WUD_STORE_CONFIG_PATH=/store/wud-config.yaml
    # Note: Address is set via command in original file, moving to environment for consistency
    command:
      - '--host.docker.address=tcp://docker-proxy:2375'
    ports:
      - "3838:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    # 加入標籤讓 WUD 自己也監控自己
    labels:
      - "wud.tag.include=^\\d+\\.\\d+\\.\\d+$"
    logging:
      driver: json-file
      options:
        max-size: "${TIGER_LOG_MAX_SIZE:-50m}"
        max-file: "3"

networks:
  ai_stack_net:
    external: true
