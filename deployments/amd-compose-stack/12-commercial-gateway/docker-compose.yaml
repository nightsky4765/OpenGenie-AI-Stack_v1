services:
  system-api-bridge:
    image: python:3.11-slim
    container_name: system-api-bridge
    restart: always
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn httpx && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${SYSTEM_API_GATEWAY_PORT:-5055}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "${TIGER_LOG_MAX_SIZE:-50m}"
        max-file: "3"

networks:
  ai_stack_net:
    external: true
