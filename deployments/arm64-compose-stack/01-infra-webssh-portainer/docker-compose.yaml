services:
  webssh:
    image: ${WEBSSH_IMAGE:-jrohy/webssh:latest}
    container_name: webssh
    restart: always
    network_mode: host
    environment:
      - TZ=${TZ:-Asia/Taipei}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  portainer:
    image: ${PORTAINER_IMAGE:-portainer/portainer-ce:latest}
    container_name: portainer
    restart: always
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    networks:
      - ai_stack_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  portainer-edge-agent:
    image: ${PORTAINER_AGENT_IMAGE:-portainer/agent:latest}
    container_name: portainer-edge-agent
    restart: always
    environment:
      - EDGE=1
      - EDGE_ID=${EDGE_ID:-}
      - EDGE_KEY=${EDGE_KEY:-}
      - EDGE_INSECURE_POLL=${EDGE_INSECURE_POLL:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - portainer_agent_data:/data
    networks:
      - ai_stack_net

networks:
  ai_stack_net:
    external: true

volumes:
  portainer_data:
  portainer_agent_data:
