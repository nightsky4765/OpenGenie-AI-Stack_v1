services:
  n8n-main:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    container_name: n8n-main-01
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks:
      - ai_stack_net
    shm_size: 1gb
    volumes:
      - ${N8N_DIR:-/home/wrt/TigerAI/node/n8n}:/home/node/.n8n
      - ${FILES_DIR:-/home/wrt/TigerAI/node/n8n/files}:/home/node/.n8n-files
    environment:
      - DB_TYPE=${DB_TYPE:-postgresdb}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-tigerai}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-postgres}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-adm}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-CHANGE_ME}
      - DB_POSTGRESDB_SCHEMA=${DB_POSTGRESDB_SCHEMA:-public}
      - QUEUE_MODE=${QUEUE_MODE:-redis}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=${REDIS_HOST:-redis}
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_SECRET:-CHANGE_ME}
      - N8N_ENCRYPTION_KEY=${N8N_SECRET:-CHANGE_ME}
      - GENERIC_TIMEZONE=Asia/Taipei
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      - N8N_SECURE_COOKIE=false
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_EDITOR_BASE_URL=${N8N_URL:-http://localhost:5678}
      - WEBHOOK_URL=${N8N_URL:-http://localhost:5678}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  n8n-worker:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    restart: always
    command: worker
    networks:
      - ai_stack_net
    volumes:
      - ${N8N_DIR:-/home/wrt/TigerAI/node/n8n}:/home/node/.n8n
      - ${FILES_DIR:-/home/wrt/TigerAI/node/n8n/files}:/home/node/.n8n-files
    environment:
      - DB_TYPE=${DB_TYPE:-postgresdb}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-tigerai}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-postgres}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-adm}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-CHANGE_ME}
      - DB_POSTGRESDB_SCHEMA=${DB_POSTGRESDB_SCHEMA:-public}
      - QUEUE_MODE=${QUEUE_MODE:-redis}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=${REDIS_HOST:-redis}
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=${N8N_SECRET:-CHANGE_ME}
      - N8N_WORKER_MAX_CONCURRENT_EXECUTIONS=${WORKER_CONCURRENCY:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  ai_stack_net:
    external: true
