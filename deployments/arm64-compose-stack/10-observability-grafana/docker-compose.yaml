services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  gpu-exporter:
    image: ${DCGM_EXPORTER_IMAGE:-nvidia/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04}
    container_name: gpu-exporter
    restart: always
    # Enable NVIDIA GPU monitoring if available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:latest}
    container_name: cadvisor
    restart: always
    privileged: true
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    # Ensure local config exists or use default
    # command: -config.file=/etc/loki/local-config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: grafana
    restart: always
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-CHANGE_ME}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    depends_on:
      - prometheus
      - loki
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:latest}
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points'
      - "^/(sys|proc|dev|host|etc)($$|/)"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  ai_stack_net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
