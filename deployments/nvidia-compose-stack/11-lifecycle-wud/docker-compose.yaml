services:
  wud:
    image: fmartinou/whats-up-docker:latest
    container_name: wud
    restart: always
    user: root
    environment:
      - WUD_WATCHER_LOCAL_CRON=0 4 * * *
      # Custom Registry for n8n (docker.n8n.io)
      - WUD_REGISTRY_N8N_URL=https://docker.n8n.io
      - WUD_REGISTRY_N8N_NAME=n8n
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3838:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai_stack_net
    # 加入標籤讓 WUD 自己也監控自己
    labels:
      - "wud.tag.include=^\\d+\\.\\d+\\.\\d+$"
    logging:
      driver: json-file
      options:
        max-size: "${TIGER_LOG_MAX_SIZE:-50m}"
        max-file: "3"

networks:
  ai_stack_net:
    external: true
