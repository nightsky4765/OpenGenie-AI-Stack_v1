services:
  landing-frontend:
    image: ghcr.io/TigerAI-Taiwan/landing-page/frontend:latest
    container_name: landing-frontend
    restart: always
    ports:
      - "${LANDING_PORT:-80}:80"
    networks:
      - ai_stack_net
    depends_on:
      landing-api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "${TIGER_LOG_MAX_SIZE:-50m}"
        max-file: "3"

  landing-api:
    image: ghcr.io/TigerAI-Taiwan/landing-page/backend:latest
    container_name: landing-api
    restart: always
    ports:
      - "${API_PORT:-9022}:8001"
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
      - POSTGRES_HOST=${PG_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${PG_USER:-adm}
      - POSTGRES_PASSWORD=${PG_PASS:-CHANGE_ME}
      - POSTGRES_DB=${PG_DB_NAME:-tigerai}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-mosquitto}
    networks:
      - ai_stack_net
    depends_on:
      - postgres
      - redis
      - mosquitto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "${TIGER_LOG_MAX_SIZE:-50m}"
        max-file: "3"

networks:
  ai_stack_net:
    external: true
